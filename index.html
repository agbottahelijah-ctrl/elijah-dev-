<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updated Index</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg2: #f0f6ff;
            --bg3: #e4f1ff;
        }
        body {
            background-color: var(--bg);
            color: black;
        }
        nav {
            background-color: var(--bg2);
            /* Remove backdrop-filter properties */
        }
        .mobile-menu {
            background-color: var(--bg2);
        }
        .hero-pill {
            background-color: var(--bg3);
        }
        .cards {
            background-color: var(--bg2);
        }
        button {
            background-color: var(--bg3);
            color: black;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
        /* Additional styling for buttons and other elements */
    </style>
</head>
<body>
    <nav>Navigation</nav>
    <div class="mobile-menu">Mobile Menu</div>
    <div class="hero-pill">Hero Pill</div>
    <div class="cards">Card Content</div>
    <button>Click Me</button>
</body>
</html>
